; Upload limits.
;
; PHP ships with upload_max_filesize=2M / post_max_size=8M, which is below what the
; app's own validation already promises: message attachments are capped at 10MB each
; (App\Models\MessageAttachment) and listing photos at 10MB / documents at 20MB
; (StoreEquipmentSubmissionRequest). Without this file a 3MB phone photo — the exact
; "send me the data plate" case — dies in PHP before any validator runs, so the user
; gets an opaque failure instead of the clear error the rules were written to give.
;
; post_max_size covers a whole multipart request, not one file: a message may carry
; up to 8 attachments, so it is sized well above the per-file cap.
;
; Must be kept in step with client_max_body_size in nginx/default.conf — whichever
; is lower wins, and nginx rejects with a bare 413 that never reaches Laravel.

upload_max_filesize = 20M
post_max_size = 128M
