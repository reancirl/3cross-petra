name: laravel-inertia-react

services:
  app:                       # Laravel (PHP-FPM) + built assets
    build: .
    environment:
      APP_NAME: ${APP_NAME:-Laravel}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
      # Sessions/cache use the filesystem so the app boots without seeded tables;
      # PostgreSQL is still used for application data + migrations.
      SESSION_DRIVER: ${SESSION_DRIVER:-file}
      CACHE_STORE: ${CACHE_STORE:-file}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-laravel}
      DB_USERNAME: ${POSTGRES_USER:-laravel}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      REDIS_HOST: ${REDIS_HOST:-cache}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # Mail. The container has no .env file — every setting is passed here — so a
      # var that exists only in .env resolves to null inside the app. Portal message
      # notifications to Petra depend on BROKER_NOTIFICATION_EMAIL, and without it
      # customer messages reach nobody.
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-${APP_NAME:-Laravel}}
      BROKER_NOTIFICATION_EMAIL: ${BROKER_NOTIFICATION_EMAIL:-brokers@example.com}
      MESSAGE_NOTIFICATION_BATCH_MINUTES: ${MESSAGE_NOTIFICATION_BATCH_MINUTES:-10}
    volumes:
      - app_public:/var/www/html/public     # share public/ with Nginx
    depends_on: [db, cache]

  web:                       # Nginx
    image: nginx:alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - app_public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on: [app]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laravel}
      POSTGRES_USER: ${POSTGRES_USER:-laravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine

volumes:
  db_data:
  app_public:
