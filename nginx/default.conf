server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;

    # Message attachments are capped at 10MB each and up to 8 per message; listing
    # documents at 20MB. nginx's 1MB default rejected all of those with a bare 413
    # before Laravel could return its own validation message. Keep in step with
    # post_max_size in docker/uploads.ini — the lower of the two is what applies.
    client_max_body_size 128M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
